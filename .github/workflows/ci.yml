name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Packages
        run: make packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dockan-packages
          path: dist/packages/
